<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculadora One More</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#050505,#151515);
  color:#fff;
  min-height:100vh;
  padding:16px;
}

.container{
  width:100%;
  max-width:480px;
  margin:auto;
  background:#111;
  border-radius:22px;
  padding:22px;
  box-shadow:0 0 30px rgba(212,175,55,.22);
  border:1px solid rgba(212,175,55,.25);
}

h1{
  text-align:center;
  color:#d4af37;
  font-size:24px;
  margin:0 0 6px;
}

.subtitle{
  text-align:center;
  color:#bbb;
  font-size:14px;
  margin-bottom:18px;
}

label{
  display:block;
  margin-top:14px;
  font-size:14px;
  color:#ddd;
}

select,input{
  width:100%;
  margin-top:6px;
  padding:13px;
  border-radius:12px;
  border:1px solid #333;
  background:#202020;
  color:#fff;
  font-size:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:0;
  border-radius:14px;
  background:#d4af37;
  color:#000;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:18px;
  background:#1b1b1b;
  border:1px solid rgba(212,175,55,.25);
  padding:16px;
  border-radius:16px;
  line-height:1.7;
}

.note{
  font-size:12px;
  color:#aaa;
  text-align:center;
  margin-top:12px;
}

@media(max-width:420px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">
  <h1>Calculadora One More</h1>
  <div class="subtitle">Precio USD · Moneda local · Envío por QV</div>

  <label>País</label>
  <select id="pais" onchange="cambiarPais()">
    <option value="VE">🇻🇪 Venezuela</option>
    <option value="CO">🇨🇴 Colombia</option>
    <option value="EC">🇪🇨 Ecuador</option>
    <option value="PE">🇵🇪 Perú</option>
    <option value="MX">🇲🇽 México</option>
  </select>

  <div class="grid">
    <div>
      <label>Moneda</label>
      <input id="moneda" readonly>
    </div>
    <div>
      <label>Tasa</label>
      <input type="number" id="tasa" value="36" oninput="calcular()">
    </div>
  </div>

  <label>Producto</label>
  <select id="producto" onchange="calcular()">
    <option value="Painless Night Glu|64|50">Painless Night Glu</option>
    <option value="Omevia|39|32">Omevia</option>
    <option value="Melatonin|35|30">Melatonin</option>
    <option value="B12 Plus|35|30">B12 Plus</option>
    <option value="Collagen Patch|59|45">Collagen Patch</option>
    <option value="Slim Style|32|25">Slim Style</option>
    <option value="Dekamin|32|25">Dekamin</option>
    <option value="Night Ladies|59|45">Night Ladies</option>
    <option value="Night Gentleman|59|45">Night Gentleman</option>
    <option value="Glutanad|67|50">Glutanad</option>
  </select>

  <label>Cantidad</label>
  <input type="number" id="cantidad" value="1" min="1" oninput="calcular()">

  <button onclick="calcular()">Calcular</button>

  <div class="result" id="resultado"></div>

  <!-- BOTÓN MODIFICADO -->
  <button onclick="window.open('https://onemore.global/!aasespa','_blank')">
    ONE MORE INTERNACIONAL
  </button>

  <div class="note">
    Envío: 0-99 QV = $12 · 100-149 = $10 · 150-199 = $8 · 200-299 = $6 · 300+ = GRATIS
  </div>
</div>

<script>
const paises = {
  VE:{moneda:"Bs", tasa:36},
  CO:{moneda:"COP", tasa:4000},
  EC:{moneda:"USD", tasa:1},
  PE:{moneda:"S/", tasa:3.7},
  MX:{moneda:"MXN", tasa:17}
};

function cambiarPais(){
  let p = paises[document.getElementById("pais").value];
  document.getElementById("moneda").value = p.moneda;
  document.getElementById("tasa").value = p.tasa;
  calcular();
}

function envio(qv){
  if(qv>=300) return 0;
  if(qv>=200) return 6;
  if(qv>=150) return 8;
  if(qv>=100) return 10;
  return 12;
}

function calcular(){
  let data = document.getElementById("producto").value.split("|");
  let nombre = data[0];
  let precio = parseFloat(data[1]);
  let qv = parseFloat(data[2]);

  let cantidad = parseInt(document.getElementById("cantidad").value);
  let tasa = parseFloat(document.getElementById("tasa").value);

  let totalQV = qv * cantidad;
  let sub = precio * cantidad;
  let env = envio(totalQV);
  let totalUSD = sub + env;
  let totalLocal = totalUSD * tasa;

  document.getElementById("resultado").innerHTML = `
    Producto: ${nombre}<br>
    Cantidad: ${cantidad}<br>
    QV: ${totalQV}<br>
    Subtotal: $${sub}<br>
    Envío: ${env==0?"Gratis":"$"+env}<br>
    <strong>Total USD: $${totalUSD}</strong><br>
    <strong>Total Local: ${totalLocal.toFixed(2)}</strong>
  `;
}

cambiarPais();
</script>

</body>
</html>
