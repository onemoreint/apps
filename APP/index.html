<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Pricing PRO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface-2: #fafaf8;
    --border: #e8e6e0;
    --border-focus: #1a1a1a;
    --text-primary: #111111;
    --text-secondary: #6b6b6b;
    --text-muted: #9c9c9c;
    --accent: #ff5c00;
    --accent-light: #fff3ee;
    --accent-hover: #e05200;
    --result-bg: #111111;
    --result-muted: #888;
    --result-accent: #ff8c4a;
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
    --radius-sm: 8px;
    --radius-lg: 20px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,92,0,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,92,0,0.03) 0%, transparent 50%);
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease both;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .header-badge span { font-size: 14px; }
  .header h1 {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .header p {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .container {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .card-body { padding: 28px 28px 24px; }

  /* Currency selector */
  .currency-selector-wrap { margin-bottom: 22px; }

  .currency-selector-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .currency-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .currency-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }

  .currency-pill:hover { border-color: #c8c6c0; background: #fff; }

  .currency-pill.active {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .currency-pill input[type="radio"] { display: none; }

  .pill-flag { font-size: 16px; line-height: 1; }

  .pill-info { display: flex; flex-direction: column; gap: 1px; }

  .pill-code {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .pill-name { font-size: 10px; color: var(--text-muted); line-height: 1; }

  .currency-pill.active .pill-code { color: var(--accent); }
  .currency-pill.active .pill-name { color: var(--accent); opacity: 0.7; }

  /* Inputs */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .field { position: relative; }

  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    pointer-events: none;
    transition: color 0.2s;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 5px;
    transition: color 0.2s;
  }

  .field:focus-within label { color: var(--text-primary); }

  input[type="number"] {
    width: 100%;
    padding: 12px 14px 12px 52px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    transition: all 0.2s ease;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="number"]:hover { border-color: #c8c6c0; background: #fff; }
  input[type="number"]:focus {
    border-color: var(--border-focus);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  input[type="number"]::placeholder {
    color: var(--text-muted);
    font-weight: 400;
    font-family: var(--font);
    font-size: 13px;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }

  .divider { height: 1px; background: var(--border); margin: 4px 0 20px; }

  button {
    width: 100%;
    padding: 14px 20px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
    pointer-events: none;
  }
  button:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(255,92,0,0.3);
  }
  button:active { transform: translateY(0); box-shadow: none; }

  /* Results */
  .result {
    display: none;
    background: var(--result-bg);
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 24px 28px 28px;
    animation: slideUp 0.35s ease both;
  }
  .result.visible { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--result-muted);
  }

  .result-currency-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    padding: 3px 10px 3px 6px;
    font-size: 11px;
    color: #aaa;
    font-family: var(--mono);
  }

  .result-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .result-row { display: flex; justify-content: space-between; align-items: center; }
  .result-row-label { font-size: 13px; color: var(--result-muted); font-weight: 400; }
  .result-row-value { font-family: var(--mono); font-size: 14px; color: #d4d4d0; font-weight: 500; }
  .result-separator { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

  .result-final {
    background: rgba(255,140,74,0.1);
    border: 1px solid rgba(255,140,74,0.2);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-final-label { font-size: 13px; font-weight: 500; color: var(--result-accent); }
  .result-final-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--result-accent);
    letter-spacing: -0.02em;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    animation: fadeUp 0.5s ease 0.2s both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body { padding: 20px 12px 40px; justify-content: flex-start; padding-top: 40px; }
    .card-body { padding: 22px 20px 20px; }
    .result { padding: 20px 20px 24px; }
    .result-final-value { font-size: 20px; }
    .currency-pills { gap: 6px; }
    .currency-pill { padding: 7px 11px; }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-badge"><span>⚡</span> Herramienta profesional</div>
    <h1>Calculadora de Pricing</h1>
    <p>Calcula el precio justo para tus servicios en segundos</p>
  </div>

  <div class="container">
    <div class="card-body">

      <!-- Selector de moneda -->
      <div class="currency-selector-wrap">
        <p class="currency-selector-label">Moneda</p>
        <div class="currency-pills">

          <label class="currency-pill active" id="pill-USD">
            <input type="radio" name="moneda" value="USD" checked onchange="cambiarMoneda(this)">
            <span class="pill-flag">🇺🇸</span>
            <div class="pill-info">
              <span class="pill-code">USD</span>
              <span class="pill-name">Dólar</span>
            </div>
          </label>

          <label class="currency-pill" id="pill-USDT">
            <input type="radio" name="moneda" value="USDT" onchange="cambiarMoneda(this)">
            <span class="pill-flag">🪙</span>
            <div class="pill-info">
              <span class="pill-code">USDT</span>
              <span class="pill-name">Tether</span>
            </div>
          </label>

          <label class="currency-pill" id="pill-VES">
            <input type="radio" name="moneda" value="VES" onchange="cambiarMoneda(this)">
            <span class="pill-flag">🇻🇪</span>
            <div class="pill-info">
              <span class="pill-code">VES</span>
              <span class="pill-name">Bolívar</span>
            </div>
          </label>

          <label class="currency-pill" id="pill-COP">
            <input type="radio" name="moneda" value="COP" onchange="cambiarMoneda(this)">
            <span class="pill-flag">🇨🇴</span>
            <div class="pill-info">
              <span class="pill-code">COP</span>
              <span class="pill-name">Peso Col.</span>
            </div>
          </label>

        </div>
      </div>

      <!-- Costos por hora -->
      <p class="section-label">Costos por hora</p>
      <div class="input-group">
        <div class="field">
          <label for="gastos">Gastos fijos por hora</label>
          <span class="field-icon" id="icon-gastos">$</span>
          <input type="number" id="gastos" placeholder="0.00">
        </div>
        <div class="field">
          <label for="salario">Salario por hora</label>
          <span class="field-icon" id="icon-salario">$</span>
          <input type="number" id="salario" placeholder="0.00">
        </div>
      </div>

      <!-- Detalle del servicio -->
      <p class="section-label">Detalle del servicio</p>
      <div class="input-group">
        <div class="field">
          <label for="horas">Horas del servicio</label>
          <span class="field-icon">h</span>
          <input type="number" id="horas" placeholder="0">
        </div>
        <div class="field">
          <label for="materiales">Materiales</label>
          <span class="field-icon" id="icon-materiales">$</span>
          <input type="number" id="materiales" placeholder="0.00">
        </div>
      </div>

      <div class="divider"></div>
      <button onclick="calcular()">Calcular precio →</button>

    </div>

    <div class="result" id="resultado"></div>
  </div>

  <p class="footer-note">Incluye 10% contingencia · 40% rentabilidad</p>

<script>
  // Configuración de monedas
  const MONEDAS = {
    USD:  { simbolo: '$',   codigo: 'USD',  bandera: '🇺🇸', decimales: 2 },
    USDT: { simbolo: '₮',  codigo: 'USDT', bandera: '🪙',  decimales: 2 },
    VES:  { simbolo: 'Bs.', codigo: 'VES',  bandera: '🇻🇪', decimales: 2 },
    COP:  { simbolo: '$',   codigo: 'COP',  bandera: '🇨🇴', decimales: 0 },
  };

  let monedaActual = 'USD';

  function cambiarMoneda(radio) {
    monedaActual = radio.value;

    // Actualizar pills
    document.querySelectorAll('.currency-pill').forEach(p => p.classList.remove('active'));
    radio.closest('.currency-pill').classList.add('active');

    // Actualizar iconos
    const s = MONEDAS[monedaActual].simbolo;
    document.getElementById('icon-gastos').textContent     = s;
    document.getElementById('icon-salario').textContent    = s;
    document.getElementById('icon-materiales').textContent = s;

    // Recalcular si ya hay resultado
    const el = document.getElementById('resultado');
    if (el.classList.contains('visible')) calcular();
  }

  function fmt(n) {
    const m = MONEDAS[monedaActual];
    const formatted = n.toLocaleString('es-VE', {
      minimumFractionDigits: m.decimales,
      maximumFractionDigits: m.decimales
    });
    return m.simbolo + ' ' + formatted;
  }

  // Lógica original intacta
  function calcular(){
    let gastos     = parseFloat(document.getElementById("gastos").value)     || 0;
    let salario    = parseFloat(document.getElementById("salario").value)    || 0;
    let horas      = parseFloat(document.getElementById("horas").value)      || 0;
    let materiales = parseFloat(document.getElementById("materiales").value) || 0;

    // Fórmulas
    let tarifa       = gastos + salario;
    let mano         = tarifa * horas;
    let contingencia = (mano + materiales) * 0.10;
    let costo        = mano + materiales + contingencia;
    let rentabilidad = costo * 0.40;
    let precio       = costo + rentabilidad;

    // Mostrar
    const m  = MONEDAS[monedaActual];
    const el = document.getElementById("resultado");

    el.innerHTML = `
      <div class="result-header">
        <p class="result-label">Desglose del precio</p>
        <span class="result-currency-badge">${m.bandera} ${m.codigo}</span>
      </div>
      <div class="result-rows">
        <div class="result-row">
          <span class="result-row-label">Tarifa por hora</span>
          <span class="result-row-value">${fmt(tarifa)}</span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Mano de obra</span>
          <span class="result-row-value">${fmt(mano)}</span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Contingencia (10%)</span>
          <span class="result-row-value">${fmt(contingencia)}</span>
        </div>
        <div class="result-separator"></div>
        <div class="result-row">
          <span class="result-row-label">Costo total</span>
          <span class="result-row-value">${fmt(costo)}</span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Rentabilidad (40%)</span>
          <span class="result-row-value">${fmt(rentabilidad)}</span>
        </div>
      </div>
      <div class="result-final">
        <span class="result-final-label">Precio final</span>
        <span class="result-final-value">${fmt(precio)}</span>
      </div>
    `;
    el.classList.add("visible");
  }
</script>

</body>
</html>
